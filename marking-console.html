<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marking Console</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #10141a;
    --panel: #171d26;
    --panel-2: #1d2530;
    --border: #29323f;
    --text: #e6ebf2;
    --muted: #8b96a5;
    --faint: #5b6673;
    --amber: #ffb454;
    --amber-dim: #7a5a2e;
    --green: #66d9a5;
    --green-dim: #2a5443;
    --red: #f28779;
    --cyan: #6fc3d6;
    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  /* Light theme: warm cream base, pastel accents, same colour meanings.
     Only the palette variables change; every rule above reads these. */
  body.theme-light {
    --bg: #f4efe4;
    --panel: #fbf8f1;
    --panel-2: #ece4d5;
    --border: #ddd2bd;
    --text: #3a3327;
    --muted: #776e5c;
    --faint: #a99f8a;
    --amber: #b9741a;
    --amber-dim: #e6c78f;
    --green: #2f9169;
    --green-dim: #cfe9d9;
    --red: #cf5a4e;
    --cyan: #2585a0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.45;
    transition: background-color 0.2s ease, color 0.2s ease;
  }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select { font-family: inherit; }

  /* ---------- Header ---------- */
  header {
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    padding: 14px 20px 12px;
  }
  .hdr-top { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .hdr-title { font-family: var(--mono); font-size: 15px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--amber); }
  .hdr-stats { display: flex; gap: 18px; flex-wrap: wrap; font-family: var(--mono); font-size: 12px; color: var(--muted); margin-left: auto; }
  .hdr-stats b { color: var(--text); font-weight: 600; }
  .hdr-stats .today-hit b { color: var(--green); }
  #settingsBtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 4px 12px; font-family: var(--mono); font-size: 11px;
  }
  #settingsBtn:hover { border-color: var(--amber); color: var(--amber); }
  #homeBtn {
    display: none; background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 4px 12px; font-family: var(--mono); font-size: 11px;
  }
  #homeBtn:hover { border-color: var(--amber); color: var(--amber); }
  #themeBtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 4px 12px; font-family: var(--mono); font-size: 11px;
  }
  #themeBtn:hover { border-color: var(--amber); color: var(--amber); }
  .hdr-title { cursor: default; }
  body.view-workspace #homeBtn { display: inline-block; }
  body.view-workspace .hdr-title { cursor: pointer; }
  body.view-workspace .hdr-title:hover { color: var(--amber); filter: brightness(1.15); }
  .progress-wrap { margin-top: 10px; display: flex; align-items: center; gap: 12px; }
  .progress-track {
    flex: 1; height: 8px; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden; position: relative;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--amber-dim), var(--amber));
    width: 0%; transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .progress-label { font-family: var(--mono); font-size: 12px; color: var(--muted); min-width: 110px; text-align: right; }

  /* ---------- Layout ---------- */
  main { display: grid; grid-template-columns: 300px 1fr 280px; gap: 0; min-height: calc(100vh - 92px); }
  .col { border-right: 1px solid var(--border); }
  .col:last-child { border-right: none; }
  .col-head {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--faint); padding: 12px 16px 8px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }

  /* ---------- Roster column ---------- */
  .class-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .class-chip {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 4px 10px; font-family: var(--mono); font-size: 11px;
  }
  .class-chip.active { border-color: var(--amber); color: var(--amber); background: rgba(255, 180, 84, 0.07); }
  .class-chip .mini { color: var(--faint); margin-left: 5px; }
  .class-chip.active .mini { color: var(--amber-dim); }
  #roster { overflow-y: auto; max-height: calc(100vh - 210px); }
  .stu-row {
    display: flex; align-items: center; gap: 10px; padding: 7px 16px;
    border-bottom: 1px solid rgba(41, 50, 63, 0.5); cursor: pointer;
  }
  .stu-row:hover { background: var(--panel); }
  .stu-row.current { background: rgba(255, 180, 84, 0.08); box-shadow: inset 3px 0 0 var(--amber); }
  .stu-status {
    width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--faint);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  .stu-row.marked .stu-status { border-color: var(--green); background: var(--green-dim); }
  .stu-row.marked .stu-status svg { display: block; }
  .stu-status svg { display: none; width: 10px; height: 10px; stroke: var(--green); stroke-width: 3; fill: none; }
  .stu-row.missing .stu-status { border-color: var(--red); background: rgba(242, 135, 121, 0.12); }
  .stu-row.missing .stu-status::after { content: '×'; color: var(--red); font-size: 12px; line-height: 1; }
  .stu-label { font-family: var(--mono); font-size: 13px; }
  .stu-row.marked .stu-label { color: var(--muted); }
  .stu-row.missing .stu-label { color: var(--faint); text-decoration: line-through; }
  .stu-tagcount { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--faint); }

  @keyframes tickpop {
    0% { transform: scale(0.4); }
    60% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }
  .stu-row.just-marked .stu-status { animation: tickpop 0.35s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes rowflash {
    0% { background: rgba(102, 217, 165, 0.22); }
    100% { background: transparent; }
  }
  .stu-row.just-marked { animation: rowflash 0.9s ease-out; }
  @media (prefers-reduced-motion: reduce) {
    .stu-row.just-marked, .stu-row.just-marked .stu-status { animation: none; }
    .progress-fill { transition: none; }
  }

  /* ---------- Current paper column ---------- */
  .paper-col { padding: 0; display: flex; flex-direction: column; }
  #paperPanel { padding: 18px 22px; }
  .paper-pos { font-family: var(--mono); font-size: 11px; color: var(--faint); letter-spacing: 0.06em; }
  .paper-name { font-size: 24px; font-weight: 700; margin: 2px 0 14px; }
  .paper-name .cls { font-size: 13px; font-weight: 500; color: var(--muted); font-family: var(--mono); margin-left: 10px; }
  .paper-tags { display: flex; flex-wrap: wrap; gap: 6px; min-height: 30px; margin-bottom: 12px; }
  .ptag {
    background: var(--panel-2); border: 1px solid var(--amber-dim); color: var(--amber);
    font-family: var(--mono); font-size: 11px; border-radius: 5px; padding: 3px 8px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .ptag button { background: none; border: none; color: var(--faint); font-size: 13px; padding: 0; line-height: 1; }
  .ptag button:hover { color: var(--red); }
  .paper-empty-tags { color: var(--faint); font-size: 12px; font-style: italic; align-self: center; }
  #noteInput {
    width: 100%; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 13px; padding: 8px 10px; resize: vertical; min-height: 38px;
  }
  #noteInput:focus { outline: none; border-color: var(--cyan); }
  #noteInput::placeholder { color: var(--faint); }
  .paper-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .btn {
    border-radius: 7px; padding: 9px 16px; font-size: 13px; font-weight: 600;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
  }
  .btn:hover { border-color: var(--muted); }
  .btn-done { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .btn-done:hover { background: rgba(102, 217, 165, 0.25); }
  .btn-missing { color: var(--red); }
  .btn-missing:hover { border-color: var(--red); }
  .btn-copy { color: var(--cyan); }
  .btn-copy:hover { border-color: var(--cyan); }
  .nav-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-nav { padding: 6px 12px; font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .calib-banner {
    margin: 0 22px 12px; padding: 10px 14px; border: 1px solid var(--amber-dim);
    background: rgba(255, 180, 84, 0.06); border-radius: 7px; font-size: 13px; color: var(--amber);
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }
  .calib-banner button { background: none; border: none; color: var(--faint); font-size: 15px; }
  .empty-state { padding: 40px 22px; color: var(--faint); text-align: center; font-size: 13px; }
  .empty-state .btn { margin-top: 14px; }
  .class-summary-row { padding: 12px 22px; border-top: 1px solid var(--border); margin-top: auto; }

  /* ---------- Tag column ---------- */
  .tag-col { display: flex; flex-direction: column; }
  #tagAdd { display: flex; gap: 6px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  #tagInput {
    flex: 1; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 12px; padding: 6px 9px;
  }
  #tagInput:focus { outline: none; border-color: var(--amber); }
  #tagInput::placeholder { color: var(--faint); }
  #tagAdd button {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--amber);
    border-radius: 6px; padding: 6px 11px; font-size: 14px; font-weight: 600;
  }
  #tagAdd button:hover { border-color: var(--amber); }
  #tagList { overflow-y: auto; max-height: calc(100vh - 210px); padding: 8px 0; }
  .tag-row {
    display: flex; align-items: center; gap: 10px; padding: 7px 16px; cursor: pointer;
    border-left: 3px solid transparent;
  }
  .tag-row:hover { background: var(--panel); border-left-color: var(--amber); }
  .tag-row.on-paper { border-left-color: var(--amber); background: rgba(255, 180, 84, 0.05); }
  .tag-name { font-size: 12.5px; flex: 1; }
  .tag-count { font-family: var(--mono); font-size: 11px; color: var(--faint); min-width: 26px; text-align: right; }
  .tag-bar { height: 3px; background: var(--amber-dim); border-radius: 2px; margin: 3px 16px 0; opacity: 0.7; }
  .tag-hint { padding: 14px 16px; color: var(--faint); font-size: 12px; font-style: italic; }

  /* ---------- Settings modal ---------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(10, 13, 17, 0.75); display: none;
    align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; z-index: 10;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    width: 100%; max-width: 560px; padding: 22px 24px;
  }
  .modal h2 { font-family: var(--mono); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--amber); margin-bottom: 16px; }
  .modal h3 { font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--faint); margin: 18px 0 8px; font-family: var(--mono); }
  .modal label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .modal input[type="date"], .modal input[type="text"], .modal select, .modal textarea {
    width: 100%; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 13px; padding: 7px 10px; margin-bottom: 10px;
  }
  .modal textarea { min-height: 90px; font-family: var(--mono); font-size: 12px; resize: vertical; }
  .modal input:focus, .modal select:focus, .modal textarea:focus { outline: none; border-color: var(--amber); }
  .cls-item {
    display: flex; align-items: center; gap: 10px; padding: 7px 10px;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px;
    font-family: var(--mono); font-size: 12px;
  }
  .cls-item .del { margin-left: auto; background: none; border: none; color: var(--faint); font-size: 14px; }
  .cls-item .del:hover { color: var(--red); }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
  .btn-danger { color: var(--red); }
  .btn-danger:hover { border-color: var(--red); }

  /* ---------- Toast ---------- */
  #toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--panel-2); border: 1px solid var(--green); color: var(--green);
    font-family: var(--mono); font-size: 12px; padding: 9px 18px; border-radius: 7px;
    transition: transform 0.25s ease; z-index: 20; pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ---------- View toggle (dashboard vs workspace) ---------- */
  #dashboardView { display: none; }
  body.view-dashboard #dashboardView { display: block; }
  body.view-dashboard #workspaceView { display: none; }
  body.view-dashboard .hdr-stats,
  body.view-dashboard .progress-wrap { display: none; }
  body.view-workspace #dashboardView { display: none; }

  /* ---------- Dashboard ---------- */
  #dashboardView { max-width: 1080px; margin: 0 auto; width: 100%; padding: 24px 28px 44px; }
  .dash-empty { padding: 60px 20px; text-align: center; color: var(--faint); font-size: 14px; }
  .dash-empty .btn { margin-top: 16px; }
  .dash-section {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 22px; margin-bottom: 18px;
  }
  .dash-h {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--faint); margin-bottom: 12px;
  }
  .dash-hero-top { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  .dash-bignum { font-family: var(--mono); font-size: 44px; font-weight: 600; color: var(--amber); line-height: 1; }
  .dash-bigsub { font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .progress-track.lg { height: 12px; border-radius: 6px; }

  .dash-tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(118px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .tile { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 13px 15px; }
  .tile-label { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--faint); }
  .tile-value { font-family: var(--mono); font-size: 26px; font-weight: 600; margin-top: 4px; color: var(--text); }
  .tile.good .tile-value { color: var(--green); }
  .tile.warn .tile-value { color: var(--red); }

  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
  .runway-empty { color: var(--faint); font-size: 13px; line-height: 1.6; }
  .linklike { background: none; border: none; color: var(--cyan); font: inherit; padding: 0; text-decoration: underline; }
  .runway-row {
    display: flex; align-items: center; gap: 12px; padding: 9px 0;
    border-bottom: 1px solid rgba(41, 50, 63, 0.5);
  }
  .runway-row:last-child { border-bottom: none; }
  .runway-day { font-family: var(--mono); font-size: 12px; color: var(--muted); min-width: 118px; }
  .runway-row.today .runway-day { color: var(--amber); }
  .runway-bar { flex: 1; height: 6px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
  .runway-bar span { display: block; height: 100%; background: var(--amber-dim); }
  .runway-row.today .runway-bar span { background: linear-gradient(90deg, var(--amber-dim), var(--amber)); }
  .runway-num { font-family: var(--mono); font-size: 13px; color: var(--text); white-space: nowrap; text-align: right; }
  .runway-num .runway-sub { color: var(--faint); font-size: 11px; }

  .class-card { background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 13px 15px; margin-bottom: 10px; }
  .class-card:last-child { margin-bottom: 0; }
  .class-card-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .class-card-name { font-size: 14px; font-weight: 600; }
  .class-card-frac { font-family: var(--mono); font-size: 12px; color: var(--muted); white-space: nowrap; }
  .class-card .progress-track { margin: 10px 0 9px; }
  .class-card-foot { display: flex; align-items: center; gap: 12px; }
  .cc-chip { font-family: var(--mono); font-size: 11px; color: var(--faint); }
  .cc-chip.miss { color: var(--red); }
  .cc-chip.cc-done { color: var(--green); }
  .btn-resume {
    margin-left: auto; background: var(--panel); border: 1px solid var(--amber-dim); color: var(--amber);
    border-radius: 6px; padding: 5px 12px; font-family: var(--mono); font-size: 12px; font-weight: 600;
  }
  .btn-resume:hover { border-color: var(--amber); background: rgba(255, 180, 84, 0.08); }

  /* ---------- Responsive ---------- */
  @media (max-width: 980px) {
    #workspaceView { grid-template-columns: 1fr; }
    .col { border-right: none; border-bottom: 1px solid var(--border); }
    #roster, #tagList { max-height: 300px; }
  }
  @media (max-width: 760px) {
    .dash-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <button id="homeBtn" title="Back to dashboard">‹ Dashboard</button>
    <span class="hdr-title" id="hdrTitle">Marking Console</span>
    <div class="hdr-stats">
      <span>days left <b id="statDays">–</b></span>
      <span>today's target <b id="statTarget">–</b></span>
      <span class="today-hit">marked today <b id="statToday">0</b></span>
      <span>missing <b id="statMissing">0</b></span>
    </div>
    <button id="themeBtn" title="Toggle light/dark">☀ Light</button>
    <button id="settingsBtn">Set up</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 / 0 marked</div>
  </div>
</header>

<main id="dashboardView"></main>

<main id="workspaceView">
  <!-- Roster -->
  <section class="col">
    <div class="col-head"><span>Papers</span><span id="classProgress"></span></div>
    <div class="class-chips" id="classChips"></div>
    <div id="roster"></div>
  </section>

  <!-- Current paper -->
  <section class="col paper-col">
    <div class="col-head"><span>Current paper</span></div>
    <div id="calibHolder"></div>
    <div id="paperPanel"></div>
    <div class="class-summary-row">
      <button class="btn btn-copy" id="classSummaryBtn" style="font-size:12px; padding:7px 12px;">Copy class tag summary</button>
    </div>
  </section>

  <!-- Tags -->
  <section class="col tag-col">
    <div class="col-head"><span>Trip hazards</span><span id="tagTotal"></span></div>
    <div id="tagAdd">
      <input id="tagInput" placeholder="New tag, e.g. sig figs dropped" maxlength="80">
      <button id="tagAddBtn" title="Add tag">+</button>
    </div>
    <div id="tagList"></div>
  </section>
</main>

<!-- Settings modal -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <h2>Set up</h2>

    <h3>Deadline</h3>
    <label for="endDate">Last day of marking (used to compute daily target)</label>
    <input type="date" id="endDate">

    <h3>Classes</h3>
    <div id="classList"></div>
    <label for="newClassName">Class name</label>
    <input type="text" id="newClassName" placeholder="e.g. 11PSC Physical Sciences">
    <label for="newRoster">Roster, one student per line, first name then last name</label>
    <textarea id="newRoster" placeholder="Sophia King&#10;Liam Patel&#10;Aroha Ngata"></textarea>
    <button class="btn" id="addClassBtn">Add class</button>

    <h3>Calibration check</h3>
    <label for="calibSelect">Remind me to re-read my first marked paper every…</label>
    <select id="calibSelect">
      <option value="0">Off</option>
      <option value="5">5 papers</option>
      <option value="8">8 papers</option>
      <option value="10">10 papers</option>
    </select>

    <h3>Data</h3>
    <div class="modal-actions" style="margin-top:6px;">
      <button class="btn" id="exportBtn">Export backup (JSON)</button>
      <button class="btn" id="importBtn">Import backup</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
      <button class="btn btn-danger" id="resetBtn">Reset everything</button>
    </div>

    <div class="modal-actions">
      <button class="btn btn-done" id="closeSettingsBtn">Done</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ---------------- State ----------------
const KEY = 'markingConsole.v1';
const blank = () => ({
  classes: [],          // {id, name, students:[{id, first, last, label, status:'unmarked'|'marked'|'missing', tags:[], note:'', markedAt:null}]}
  tags: [],             // {id, name}
  ui: { currentClass: null, currentStudent: null, view: 'dashboard', theme: 'dark' },
  settings: { endDate: '', calibrateEvery: 0 }
});
let S = load();

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.warn('Load failed', e); }
  return blank();
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(S)); }
  catch (e) { toast('Warning: could not save'); }
}
const uid = () => Math.random().toString(36).slice(2, 9);

// ---------------- Derived helpers ----------------
const curClass = () => S.classes.find(c => c.id === S.ui.currentClass) || null;
const curStudent = () => {
  const c = curClass();
  return c ? c.students.find(s => s.id === S.ui.currentStudent) || null : null;
};
const allStudents = () => S.classes.flatMap(c => c.students);
const tagCount = tagId => allStudents().reduce((n, s) => n + (s.tags.includes(tagId) ? 1 : 0), 0);
const tagName = tagId => (S.tags.find(t => t.id === tagId) || {}).name || '?';

function todayStr() { return new Date().toISOString().slice(0, 10); }
function daysLeft() {
  if (!S.settings.endDate) return null;
  const end = new Date(S.settings.endDate + 'T23:59:59');
  const diff = Math.ceil((end - new Date()) / 86400000);
  return Math.max(diff, 0);
}

// Single source of truth for the cross-class figures shown in both the
// header and the dashboard, so the two can never drift apart.
function stats() {
  const all = allStudents();
  const total = all.length;
  const marked = all.filter(s => s.status === 'marked').length;
  const missing = all.filter(s => s.status === 'missing').length;
  const remaining = total - marked - missing;
  const markedToday = all.filter(s => s.status === 'marked' && s.markedAt && s.markedAt.slice(0, 10) === todayStr()).length;
  const dl = daysLeft();
  // Daily target: today's marked papers count toward today, so the target is
  // computed as if today started fresh, then stays stable through the day.
  const dailyTarget = (dl && dl > 0) ? Math.ceil((remaining + markedToday) / dl) : null;
  const denom = total - missing;
  const pct = denom ? Math.round(100 * marked / denom) : 0;
  return { total, marked, missing, remaining, markedToday, dl, dailyTarget, denom, pct };
}

// Date helpers for the runway. Kept local and dependency free.
function addDays(base, n) { const d = new Date(base); d.setDate(d.getDate() + n); return d; }
function fmtDay(d, i) {
  if (i === 0) return 'Today';
  if (i === 1) return 'Tomorrow';
  return d.toLocaleDateString('en-NZ', { weekday: 'short', day: 'numeric', month: 'short' });
}

// ---------------- Label generation ----------------
// Alphabetical by surname; labels are "First X", extending the surname
// prefix until unique within the class.
function buildLabels(students) {
  students.sort((a, b) => a.last.localeCompare(b.last) || a.first.localeCompare(b.first));
  students.forEach(s => { s._len = 1; });
  let changed = true;
  while (changed) {
    changed = false;
    const seen = {};
    students.forEach(s => {
      const lab = s.first + ' ' + s.last.slice(0, s._len);
      (seen[lab] = seen[lab] || []).push(s);
    });
    Object.values(seen).forEach(group => {
      if (group.length > 1) {
        group.forEach(s => {
          if (s._len < s.last.length) { s._len++; changed = true; }
        });
      }
    });
  }
  const finalSeen = {};
  students.forEach(s => {
    let lab = s.first + ' ' + s.last.slice(0, s._len);
    if (finalSeen[lab]) { lab += ' ' + (++finalSeen[lab]); } else { finalSeen[lab] = 1; }
    s.label = lab;
    delete s._len;
  });
}

// ---------------- Rendering ----------------
function render() {
  const view = (S.ui.view === 'workspace') ? 'workspace' : 'dashboard';
  document.body.classList.toggle('view-dashboard', view === 'dashboard');
  document.body.classList.toggle('view-workspace', view === 'workspace');
  const light = S.ui.theme === 'light';
  document.body.classList.toggle('theme-light', light);
  document.getElementById('themeBtn').textContent = light ? '☾ Night' : '☀ Light';
  renderHeader(); renderDashboard(); renderChips(); renderRoster(); renderPaper(); renderTags();
}

function toggleTheme() {
  S.ui.theme = S.ui.theme === 'light' ? 'dark' : 'light';
  save(); render();
}

function renderHeader() {
  const st = stats();
  document.getElementById('statDays').textContent = st.dl === null ? '–' : st.dl;
  document.getElementById('statTarget').textContent = st.dailyTarget === null ? '–' : st.dailyTarget;
  document.getElementById('statToday').textContent = st.markedToday;
  document.getElementById('statMissing').textContent = st.missing;
  document.getElementById('progressFill').style.width = st.pct + '%';
  document.getElementById('progressLabel').textContent = `${st.marked} / ${st.denom} marked (${st.pct}%)`;
}

// ---------------- Dashboard (landing view) ----------------
function renderDashboard() {
  const el = document.getElementById('dashboardView');
  if (!S.classes.length) {
    el.innerHTML = `<div class="dash-empty">No classes set up yet.<br>
      <button class="btn" onclick="openSettings()">Open Set up</button></div>`;
    return;
  }
  const st = stats();
  const onTrack = st.dailyTarget !== null && st.markedToday >= st.dailyTarget;

  let html = `
    <section class="dash-section">
      <div class="dash-h">Overall progress</div>
      <div class="dash-hero-top">
        <span class="dash-bignum">${st.pct}%</span>
        <span class="dash-bigsub">${st.marked} of ${st.denom} papers marked${st.missing ? ` · ${st.missing} not submitted` : ''}</span>
      </div>
      <div class="progress-track lg" style="margin-top:14px;"><div class="progress-fill" style="width:${st.pct}%"></div></div>
    </section>

    <section class="dash-tiles">
      ${tile('Days left', st.dl === null ? '–' : st.dl)}
      ${tile("Today's target", st.dailyTarget === null ? '–' : st.dailyTarget)}
      ${tile('Marked today', st.markedToday, onTrack ? 'good' : '')}
      ${tile('Remaining', st.remaining, st.remaining === 0 ? 'good' : '')}
      ${tile('Missing', st.missing, st.missing ? 'warn' : '')}
    </section>

    <div class="dash-grid">
      <section class="dash-section"><div class="dash-h">Runway</div>${runwayHtml(st)}</section>
      <section class="dash-section"><div class="dash-h">Classes</div>${classesHtml()}</section>
    </div>`;
  el.innerHTML = html;
}

function tile(label, value, cls) {
  return `<div class="tile ${cls || ''}"><div class="tile-label">${esc(label)}</div>
    <div class="tile-value">${esc(String(value))}</div></div>`;
}

// The runway is deliberately one self-contained function: today's target uses
// the stable header formula, the remainder is spread evenly (front loaded)
// across the days left. A future "which days do I mark" rule, or a calendar
// feed, replaces only the distribution block below.
function runwayHtml(st) {
  if (!S.settings.endDate) {
    return `<div class="runway-empty">Set a deadline in
      <button class="linklike" onclick="openSettings()">Set up</button> to see a day by day plan.<br>
      ${st.remaining} paper${st.remaining === 1 ? '' : 's'} remaining.</div>`;
  }
  if (st.dl === 0) {
    return `<div class="runway-empty">Deadline reached.
      ${st.remaining ? st.remaining + ' paper' + (st.remaining === 1 ? '' : 's') + ' still to mark.' : 'All caught up. 🎉'}</div>`;
  }
  if (st.remaining === 0) {
    return `<div class="runway-empty">All papers marked. Nothing left on the runway. 🎉</div>`;
  }

  // Runway rows are papers still to mark, so today is what's left to reach the
  // target (0 once you've hit it), and every row sums to the papers remaining.
  const todayLeft = Math.max(0, st.dailyTarget - st.markedToday);
  const afterToday = Math.max(0, st.remaining - todayLeft);
  const futureDays = st.dl - 1;

  const plan = [{ i: 0, count: todayLeft, done: st.markedToday }];
  if (futureDays > 0) {
    const base = Math.floor(afterToday / futureDays);
    const extra = afterToday % futureDays;              // front load the extra papers
    for (let k = 1; k <= futureDays; k++) plan.push({ i: k, count: base + (k <= extra ? 1 : 0) });
  }

  const max = Math.max(1, ...plan.map(p => p.count));
  const today = new Date();
  const CAP = 12;
  let rows = plan.slice(0, CAP).map(p => {
    const w = Math.round(100 * p.count / max);
    let num;
    if (p.i === 0) {
      num = (p.count === 0)
        ? `<span style="color:var(--green)">target met</span> <span class="runway-sub">· ${p.done} done</span>`
        : `${p.count} paper${p.count === 1 ? '' : 's'} <span class="runway-sub">· ${p.done} done</span>`;
    } else {
      num = `${p.count} paper${p.count === 1 ? '' : 's'}`;
    }
    return `<div class="runway-row${p.i === 0 ? ' today' : ''}">
      <span class="runway-day">${esc(fmtDay(addDays(today, p.i), p.i))}</span>
      <span class="runway-bar"><span style="width:${w}%"></span></span>
      <span class="runway-num">${num}</span>
    </div>`;
  }).join('');
  if (plan.length > CAP) {
    rows += `<div class="runway-row"><span class="runway-day" style="color:var(--faint)">+ ${plan.length - CAP} more days</span></div>`;
  }
  return rows;
}

function classesHtml() {
  return S.classes.map(c => {
    const done = c.students.filter(s => s.status === 'marked').length;
    const missing = c.students.filter(s => s.status === 'missing').length;
    const denom = c.students.length - missing;
    const remaining = denom - done;
    const pct = denom ? Math.round(100 * done / denom) : 0;
    const complete = denom > 0 && remaining === 0;
    const missChip = missing ? `<span class="cc-chip miss">${missing} missing</span>` : '';
    const foot = complete
      ? `<span class="cc-chip cc-done">Complete ✓</span>${missChip}<button class="btn-resume" onclick="resumeClass('${c.id}')">Review</button>`
      : `<span class="cc-chip">${remaining} to mark</span>${missChip}<button class="btn-resume" onclick="resumeClass('${c.id}')">Resume ›</button>`;
    return `<div class="class-card">
      <div class="class-card-top">
        <span class="class-card-name">${esc(c.name)}</span>
        <span class="class-card-frac">${done}/${denom}${denom ? ` · ${pct}%` : ''}</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="class-card-foot">${foot}</div>
    </div>`;
  }).join('');
}

function resumeClass(cid) {
  S.ui.currentClass = cid;
  const c = curClass();
  if (c) {
    const first = c.students.find(s => s.status === 'unmarked');
    S.ui.currentStudent = first ? first.id : (c.students[0] ? c.students[0].id : null);
  }
  S.ui.view = 'workspace';
  save(); render();
}

function goDashboard() {
  S.ui.view = 'dashboard';
  save(); render();
}

function renderChips() {
  const holder = document.getElementById('classChips');
  holder.innerHTML = '';
  if (!S.classes.length) {
    holder.innerHTML = '<span style="color:var(--faint);font-size:12px;">No classes yet. Open Set up.</span>';
    return;
  }
  S.classes.forEach(c => {
    const done = c.students.filter(s => s.status === 'marked').length;
    const denom = c.students.filter(s => s.status !== 'missing').length;
    const b = document.createElement('button');
    b.className = 'class-chip' + (c.id === S.ui.currentClass ? ' active' : '');
    b.innerHTML = `${esc(c.name)}<span class="mini">${done}/${denom}</span>`;
    b.onclick = () => { S.ui.currentClass = c.id; S.ui.currentStudent = null; save(); render(); };
    holder.appendChild(b);
  });
}

function renderRoster() {
  const holder = document.getElementById('roster');
  const cp = document.getElementById('classProgress');
  holder.innerHTML = '';
  const c = curClass();
  if (!c) { cp.textContent = ''; return; }
  const done = c.students.filter(s => s.status === 'marked').length;
  cp.textContent = `${done}/${c.students.length}`;
  c.students.forEach(s => {
    const row = document.createElement('div');
    row.className = 'stu-row ' + s.status + (s.id === S.ui.currentStudent ? ' current' : '');
    row.innerHTML = `
      <span class="stu-status"><svg viewBox="0 0 12 12"><path d="M2 6.5 L5 9.5 L10 3"/></svg></span>
      <span class="stu-label">${esc(s.label)}</span>
      <span class="stu-tagcount">${s.tags.length ? s.tags.length + ' tag' + (s.tags.length > 1 ? 's' : '') : ''}</span>`;
    row.onclick = () => { S.ui.currentStudent = s.id; save(); render(); };
    holder.appendChild(row);
  });
}

function renderPaper() {
  const holder = document.getElementById('paperPanel');
  const s = curStudent();
  const c = curClass();
  if (!S.classes.length) {
    holder.innerHTML = `<div class="empty-state">No classes set up yet.<br>
      <button class="btn" onclick="openSettings()">Open Set up</button></div>`;
    return;
  }
  if (!c) {
    holder.innerHTML = `<div class="empty-state">Choose a class on the left to begin.</div>`;
    return;
  }
  if (!s) {
    holder.innerHTML = `<div class="empty-state">Select a paper from the roster,<br>or jump to the next unmarked one.<br>
      <button class="btn" onclick="gotoNextUnmarked()">Next unmarked paper</button></div>`;
    return;
  }
  const idx = c.students.indexOf(s) + 1;
  const tagsHtml = s.tags.length
    ? s.tags.map(tid => `<span class="ptag">${esc(tagName(tid))}<button title="Remove" onclick="removeTagFromPaper('${tid}')">×</button></span>`).join('')
    : '<span class="paper-empty-tags">Click tags on the right as you spot mistakes.</span>';
  holder.innerHTML = `
    <div class="paper-pos">PAPER ${idx} OF ${c.students.length}</div>
    <div class="paper-name">${esc(s.label)}<span class="cls">${esc(c.name)}</span></div>
    <div class="paper-tags">${tagsHtml}</div>
    <textarea id="noteInput" placeholder="Optional note for this paper (goes into the feedback prompt)">${esc(s.note || '')}</textarea>
    <div class="paper-actions">
      <button class="btn btn-done" onclick="markDone()">✓ Mark done</button>
      <button class="btn btn-copy" onclick="copyPrompt()">Copy feedback prompt</button>
      <button class="btn btn-missing" onclick="toggleMissing()">${s.status === 'missing' ? 'Un-mark missing' : 'Not submitted'}</button>
    </div>
    <div class="nav-row">
      <button class="btn btn-nav" onclick="step(-1)">← Prev</button>
      <button class="btn btn-nav" onclick="step(1)">Next →</button>
      <button class="btn btn-nav" onclick="gotoNextUnmarked()">Next unmarked ⇥</button>
    </div>`;
  document.getElementById('noteInput').addEventListener('change', e => {
    s.note = e.target.value; save(); renderRoster();
  });
}

function renderTags() {
  const list = document.getElementById('tagList');
  list.innerHTML = '';
  const s = curStudent();
  if (!S.tags.length) {
    list.innerHTML = '<div class="tag-hint">Add trip hazards as you meet them. Click one to log it against the current paper; the list sorts by frequency so common mistakes rise to the top.</div>';
    document.getElementById('tagTotal').textContent = '';
    return;
  }
  const counts = S.tags.map(t => ({ t, n: tagCount(t.id) }));
  counts.sort((a, b) => b.n - a.n || a.t.name.localeCompare(b.t.name));
  const max = Math.max(1, ...counts.map(x => x.n));
  counts.forEach(({ t, n }) => {
    const row = document.createElement('div');
    row.className = 'tag-row' + (s && s.tags.includes(t.id) ? ' on-paper' : '');
    row.innerHTML = `<span class="tag-name">${esc(t.name)}</span><span class="tag-count">×${n}</span>`;
    row.onclick = () => toggleTagOnPaper(t.id);
    list.appendChild(row);
    if (n > 0) {
      const bar = document.createElement('div');
      bar.className = 'tag-bar';
      bar.style.width = `calc(${Math.round(100 * n / max)}% - 32px)`;
      list.appendChild(bar);
    }
  });
  const total = counts.reduce((a, x) => a + x.n, 0);
  document.getElementById('tagTotal').textContent = total ? `${total} logged` : '';
}

// ---------------- Actions ----------------
function toggleTagOnPaper(tagId) {
  const s = curStudent();
  if (!s) { toast('Select a paper first'); return; }
  const i = s.tags.indexOf(tagId);
  if (i >= 0) s.tags.splice(i, 1); else s.tags.push(tagId);
  save(); renderRoster(); renderPaper(); renderTags();
}
function removeTagFromPaper(tagId) {
  const s = curStudent();
  if (!s) return;
  const i = s.tags.indexOf(tagId);
  if (i >= 0) s.tags.splice(i, 1);
  save(); renderRoster(); renderPaper(); renderTags();
}
function addTag() {
  const input = document.getElementById('tagInput');
  const name = input.value.trim();
  if (!name) return;
  if (S.tags.some(t => t.name.toLowerCase() === name.toLowerCase())) { toast('Tag already exists'); return; }
  const t = { id: uid(), name };
  S.tags.push(t);
  const s = curStudent();
  if (s) s.tags.push(t.id);   // adding a tag mid-paper almost always means you just saw it
  input.value = '';
  save(); render();
}

function markDone() {
  const s = curStudent();
  const c = curClass();
  if (!s || !c) return;
  s.status = 'marked';
  s.markedAt = new Date().toISOString();
  save();
  render();
  // tick animation on the row
  const rows = document.querySelectorAll('.stu-row');
  const idx = c.students.indexOf(s);
  if (rows[idx]) {
    rows[idx].classList.add('just-marked');
    setTimeout(() => rows[idx] && rows[idx].classList.remove('just-marked'), 950);
  }
  maybeCalibrate(c);
  setTimeout(gotoNextUnmarked, 350);
}

function toggleMissing() {
  const s = curStudent();
  if (!s) return;
  s.status = s.status === 'missing' ? 'unmarked' : 'missing';
  if (s.status === 'missing') s.markedAt = null;
  save(); render();
}

function step(dir) {
  const c = curClass();
  if (!c || !c.students.length) return;
  let i = c.students.findIndex(s => s.id === S.ui.currentStudent);
  i = (i + dir + c.students.length) % c.students.length;
  S.ui.currentStudent = c.students[i].id;
  save(); render();
}
function gotoNextUnmarked() {
  const c = curClass();
  if (!c) return;
  const start = Math.max(0, c.students.findIndex(s => s.id === S.ui.currentStudent));
  const n = c.students.length;
  for (let k = 1; k <= n; k++) {
    const s = c.students[(start + k) % n];
    if (s.status === 'unmarked') { S.ui.currentStudent = s.id; save(); render(); return; }
  }
  // none left unmarked
  S.ui.currentStudent = null; save(); render();
  toast('All papers in this class are done 🎉');
}

// ---------------- Calibration ----------------
function maybeCalibrate(c) {
  const every = S.settings.calibrateEvery;
  if (!every) return;
  const marked = c.students.filter(s => s.status === 'marked');
  if (marked.length && marked.length % every === 0) {
    const first = marked.slice().sort((a, b) => (a.markedAt || '').localeCompare(b.markedAt || ''))[0];
    const holder = document.getElementById('calibHolder');
    holder.innerHTML = `<div class="calib-banner">
      <span>Calibration check: re-read your first marked paper (${esc(first.label)}) and confirm you'd give it the same mark.</span>
      <button onclick="this.parentElement.remove()">×</button></div>`;
  }
}

// ---------------- Exports ----------------
function copyPrompt() {
  const s = curStudent(); const c = curClass();
  if (!s || !c) return;
  const lines = s.tags.map(tid => '- ' + tagName(tid));
  let txt = `Write a feedback comment for ${s.first}, a student in my ${c.name} class.\n\n`;
  txt += lines.length
    ? `Observed issues from my marking:\n${lines.join('\n')}\n`
    : `No specific recurring issues were tagged; the work was broadly sound.\n`;
  if (s.note && s.note.trim()) txt += `\nMarker's note: ${s.note.trim()}\n`;
  txt += `\nRequirements: address the student directly by first name; encouraging but honest; specific and actionable; around 80 words; plain readable prose; do not invent issues beyond those listed.`;
  clip(txt, 'Feedback prompt copied');
}

function copyClassSummary() {
  const c = curClass();
  if (!c) { toast('Select a class first'); return; }
  const marked = c.students.filter(s => s.status === 'marked').length;
  const missing = c.students.filter(s => s.status === 'missing').length;
  const freq = {};
  c.students.forEach(s => s.tags.forEach(tid => { freq[tid] = (freq[tid] || 0) + 1; }));
  const rows = Object.entries(freq)
    .sort((a, b) => b[1] - a[1])
    .map(([tid, n]) => `${String(n).padStart(3)} × ${tagName(tid)}`);
  let txt = `${c.name} — tag summary (${marked}/${c.students.length} marked, ${missing} missing)\n`;
  txt += rows.length ? rows.join('\n') : '(no tags logged)';
  clip(txt, 'Class summary copied');
}

function clip(text, msg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => toast(msg), () => fallbackClip(text, msg));
  } else fallbackClip(text, msg);
}
function fallbackClip(text, msg) {
  const ta = document.createElement('textarea');
  ta.value = text; document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); toast(msg); } catch (e) { toast('Copy failed'); }
  document.body.removeChild(ta);
}

// ---------------- Settings ----------------
function openSettings() {
  document.getElementById('endDate').value = S.settings.endDate || '';
  document.getElementById('calibSelect').value = String(S.settings.calibrateEvery || 0);
  renderClassList();
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
  render();
}
function renderClassList() {
  const holder = document.getElementById('classList');
  holder.innerHTML = S.classes.length ? '' : '<div style="color:var(--faint);font-size:12px;margin-bottom:8px;">No classes yet.</div>';
  S.classes.forEach(c => {
    const d = document.createElement('div');
    d.className = 'cls-item';
    d.innerHTML = `<span>${esc(c.name)}</span><span style="color:var(--faint)">${c.students.length} students</span>
      <button class="del" title="Delete class">×</button>`;
    d.querySelector('.del').onclick = () => {
      if (confirm(`Delete ${c.name} and all its marking data?`)) {
        S.classes = S.classes.filter(x => x.id !== c.id);
        if (S.ui.currentClass === c.id) { S.ui.currentClass = null; S.ui.currentStudent = null; }
        save(); renderClassList(); render();
      }
    };
    holder.appendChild(d);
  });
}
function addClass() {
  const name = document.getElementById('newClassName').value.trim();
  const rosterRaw = document.getElementById('newRoster').value.trim();
  if (!name || !rosterRaw) { toast('Class name and roster both needed'); return; }
  const students = rosterRaw.split('\n').map(line => line.trim()).filter(Boolean).map(line => {
    const parts = line.split(/\s+/);
    const first = parts[0];
    const last = parts.length > 1 ? parts[parts.length - 1] : '';
    return { id: uid(), first, last, label: '', status: 'unmarked', tags: [], note: '', markedAt: null };
  });
  buildLabels(students);
  S.classes.push({ id: uid(), name, students });
  if (!S.ui.currentClass) S.ui.currentClass = S.classes[S.classes.length - 1].id;
  document.getElementById('newClassName').value = '';
  document.getElementById('newRoster').value = '';
  save(); renderClassList(); render();
  toast(`${name} added, ${students.length} students`);
}

function exportBackup() {
  const blob = new Blob([JSON.stringify(S, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `marking-console-backup-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}
function importBackup(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.classes || !data.tags) throw new Error('bad shape');
      S = data; save(); render(); renderClassList();
      toast('Backup imported');
    } catch (e) { toast('Import failed: not a valid backup'); }
  };
  reader.readAsText(file);
}

// ---------------- Utilities ----------------
function esc(str) {
  return String(str).replace(/[&<>"']/g, ch =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}
let toastTimer = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ---------------- Wiring ----------------
document.getElementById('settingsBtn').onclick = openSettings;
document.getElementById('homeBtn').onclick = goDashboard;
document.getElementById('themeBtn').onclick = toggleTheme;
document.getElementById('hdrTitle').onclick = () => { if (S.ui.view === 'workspace') goDashboard(); };
document.getElementById('closeSettingsBtn').onclick = () => {
  S.settings.endDate = document.getElementById('endDate').value;
  S.settings.calibrateEvery = parseInt(document.getElementById('calibSelect').value, 10) || 0;
  save(); closeSettings();
};
document.getElementById('addClassBtn').onclick = addClass;
document.getElementById('tagAddBtn').onclick = addTag;
document.getElementById('tagInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTag(); });
document.getElementById('classSummaryBtn').onclick = copyClassSummary;
document.getElementById('exportBtn').onclick = exportBackup;
document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').addEventListener('change', e => {
  if (e.target.files[0]) importBackup(e.target.files[0]);
  e.target.value = '';
});
document.getElementById('resetBtn').onclick = () => {
  if (confirm('Delete ALL classes, tags, and progress? This cannot be undone.')) {
    S = blank(); save(); renderClassList(); render();
  }
};
document.getElementById('settingsOverlay').addEventListener('click', e => {
  if (e.target.id === 'settingsOverlay') closeSettings();
});

// Dashboard is the landing view on every launch, even after pausing a
// session and returning; you always come back to the overview first.
if (!S.ui) S.ui = { currentClass: null, currentStudent: null, view: 'dashboard' };
S.ui.view = 'dashboard';
if (!S.ui.theme) S.ui.theme = 'dark';

// First run: open settings automatically
if (!S.classes.length) openSettings();
render();
</script>
</body>
</html>
