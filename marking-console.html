<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marking Console</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #10141a;
    --panel: #171d26;
    --panel-2: #1d2530;
    --border: #29323f;
    --text: #e6ebf2;
    --muted: #8b96a5;
    --faint: #5b6673;
    /* Okabe-Ito colourblind-safe palette. Semantic names; the light theme
       overrides these same variables below with darker shades for cream. */
    --accent: #E69F00;       /* orange: primary accent / active state */
    --accent-dim: #8a5f16;   /* dark orange: gradients, borders, bars */
    --success: #009E73;      /* green: completion */
    --success-dim: #0d4636;
    --danger: #D55E00;       /* vermillion: missing / danger */
    --info: #56B4E9;         /* sky blue: copy / export / info */
    --tag: #CC79A7;          /* purple: tag system (trip hazards) */
    --tag-dim: #6e4560;
    --warn: #F0E442;         /* yellow: calibration attention */
    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  /* Light theme: warm cream base, pastel accents, same colour meanings.
     Only the palette variables change; every rule above reads these. */
  body.theme-light {
    --bg: #f4efe4;
    --panel: #fbf8f1;
    --panel-2: #ece4d5;
    --border: #ddd2bd;
    --text: #000000;         /* black: maximum contrast on cream */
    --muted: #5f5849;
    --faint: #8f8571;
    --accent: #9a6300;        /* darkened orange for text contrast on cream */
    --accent-dim: #e0a94d;
    --success: #00795a;        /* darkened green */
    --success-dim: #cfe9d9;
    --danger: #b34d00;          /* darkened vermillion */
    --info: #0072A8;         /* blue: the cool copy/info role on light */
    --tag: #9a4f7d;       /* darkened purple */
    --tag-dim: #e7cfe0;
    --warn: #7a6100;         /* darkened yellow (gold) */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.45;
    transition: background-color 0.2s ease, color 0.2s ease;
  }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select { font-family: inherit; }

  /* ---------- Header ---------- */
  header {
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    padding: 14px 20px 12px;
  }
  .hdr-top { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .hdr-title { font-family: var(--mono); font-size: 15px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
  .hdr-stats { display: flex; gap: 18px; flex-wrap: wrap; font-family: var(--mono); font-size: 12px; color: var(--muted); margin-left: auto; }
  .hdr-stats b { color: var(--text); font-weight: 600; }
  .hdr-stats .today-hit b { color: var(--success); }
  #settingsBtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 4px 12px; font-family: var(--mono); font-size: 11px;
  }
  #settingsBtn:hover { border-color: var(--accent); color: var(--accent); }
  #homeBtn {
    display: none; background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 4px 12px; font-family: var(--mono); font-size: 11px;
  }
  #homeBtn:hover { border-color: var(--accent); color: var(--accent); }
  #themeBtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 4px 12px; font-family: var(--mono); font-size: 11px;
  }
  #themeBtn:hover { border-color: var(--accent); color: var(--accent); }
  .hdr-title { cursor: default; }
  body.view-workspace #homeBtn { display: inline-block; }
  body.view-workspace .hdr-title { cursor: pointer; }
  body.view-workspace .hdr-title:hover { color: var(--accent); filter: brightness(1.15); }
  .progress-wrap { margin-top: 10px; display: flex; align-items: center; gap: 12px; }
  .progress-track {
    flex: 1; height: 8px; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden; position: relative;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent-dim), var(--accent));
    width: 0%; transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .progress-label { font-family: var(--mono); font-size: 12px; color: var(--muted); min-width: 110px; text-align: right; }

  /* ---------- Layout ---------- */
  main { display: grid; grid-template-columns: 300px 1fr 280px; gap: 0; min-height: calc(100vh - 92px); }
  .col { border-right: 1px solid var(--border); }
  .col:last-child { border-right: none; }
  .col-head {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--faint); padding: 12px 16px 8px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }

  /* ---------- Roster column ---------- */
  .class-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .class-chip {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 4px 10px; font-family: var(--mono); font-size: 11px;
  }
  .class-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(230, 159, 0, 0.10); }
  .class-chip .mini { color: var(--faint); margin-left: 5px; }
  .class-chip.active .mini { color: var(--accent-dim); }
  #roster { overflow-y: auto; max-height: calc(100vh - 210px); }
  .stu-row {
    display: flex; align-items: center; gap: 10px; padding: 7px 16px;
    border-bottom: 1px solid rgba(41, 50, 63, 0.5); cursor: pointer;
  }
  .stu-row:hover { background: var(--panel); }
  .stu-row.current { background: rgba(230, 159, 0, 0.10); box-shadow: inset 3px 0 0 var(--accent); }
  .stu-status {
    width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--faint);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  .stu-row.marked .stu-status { border-color: var(--success); background: var(--success-dim); }
  .stu-row.marked .stu-status svg { display: block; }
  .stu-status svg { display: none; width: 10px; height: 10px; stroke: var(--success); stroke-width: 3; fill: none; }
  .stu-row.missing .stu-status { border-color: var(--danger); background: rgba(213, 94, 0, 0.14); }
  .stu-row.missing .stu-status::after { content: '×'; color: var(--danger); font-size: 12px; line-height: 1; }
  .stu-label { font-family: var(--mono); font-size: 13px; }
  .stu-row.marked .stu-label { color: var(--muted); }
  .stu-row.missing .stu-label { color: var(--faint); text-decoration: line-through; }
  .stu-tagcount { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--faint); }

  @keyframes tickpop {
    0% { transform: scale(0.4); }
    60% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }
  .stu-row.just-marked .stu-status { animation: tickpop 0.35s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes rowflash {
    0% { background: rgba(0, 158, 115, 0.24); }
    100% { background: transparent; }
  }
  .stu-row.just-marked { animation: rowflash 0.9s ease-out; }
  @media (prefers-reduced-motion: reduce) {
    .stu-row.just-marked, .stu-row.just-marked .stu-status { animation: none; }
    .progress-fill { transition: none; }
  }

  /* ---------- Current paper column ---------- */
  .paper-col { padding: 0; display: flex; flex-direction: column; }
  #paperPanel { padding: 18px 22px; }
  .paper-pos { font-family: var(--mono); font-size: 11px; color: var(--faint); letter-spacing: 0.06em; }
  .paper-name { font-size: 24px; font-weight: 700; margin: 2px 0 14px; }
  .paper-name .cls { font-size: 13px; font-weight: 500; color: var(--muted); font-family: var(--mono); margin-left: 10px; }
  .paper-tags { display: flex; flex-wrap: wrap; gap: 6px; min-height: 30px; margin-bottom: 12px; }
  .ptag {
    background: var(--panel-2); border: 1px solid var(--tag-dim); color: var(--tag);
    font-family: var(--mono); font-size: 11px; border-radius: 5px; padding: 3px 8px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .ptag button { background: none; border: none; color: var(--faint); font-size: 13px; padding: 0; line-height: 1; }
  .ptag button:hover { color: var(--danger); }
  .paper-empty-tags { color: var(--faint); font-size: 12px; font-style: italic; align-self: center; }
  #noteInput {
    width: 100%; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 13px; padding: 8px 10px; resize: vertical; min-height: 38px;
  }
  #noteInput:focus { outline: none; border-color: var(--info); }
  #noteInput::placeholder { color: var(--faint); }
  .paper-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .btn {
    border-radius: 7px; padding: 9px 16px; font-size: 13px; font-weight: 600;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
  }
  .btn:hover { border-color: var(--muted); }
  .btn-done { background: var(--success-dim); border-color: var(--success); color: var(--success); }
  .btn-done:hover { background: rgba(0, 158, 115, 0.26); }
  .btn-missing { color: var(--danger); }
  .btn-missing:hover { border-color: var(--danger); }
  .btn-copy { color: var(--info); }
  .btn-copy:hover { border-color: var(--info); }
  .nav-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-nav { padding: 6px 12px; font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .calib-banner {
    margin: 0 22px 12px; padding: 10px 14px; border: 1px solid var(--warn);
    background: rgba(240, 228, 66, 0.09); border-radius: 7px; font-size: 13px; color: var(--warn);
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }
  .calib-banner button { background: none; border: none; color: var(--faint); font-size: 15px; }
  .empty-state { padding: 40px 22px; color: var(--faint); text-align: center; font-size: 13px; }
  .empty-state .btn { margin-top: 14px; }
  .class-summary-row { padding: 12px 22px; border-top: 1px solid var(--border); margin-top: auto; display: flex; gap: 8px; flex-wrap: wrap; }

  /* ---------- Tag column ---------- */
  .tag-col { display: flex; flex-direction: column; }
  #tagAdd { display: flex; gap: 6px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  #tagInput {
    flex: 1; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 12px; padding: 6px 9px;
  }
  #tagInput:focus { outline: none; border-color: var(--tag); }
  #tagInput::placeholder { color: var(--faint); }
  #tagAdd button {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--tag);
    border-radius: 6px; padding: 6px 11px; font-size: 14px; font-weight: 600;
  }
  #tagAdd button:hover { border-color: var(--tag); }
  #tagList { overflow-y: auto; max-height: calc(100vh - 210px); padding: 8px 0; }
  .tag-row {
    display: flex; align-items: center; gap: 10px; padding: 7px 16px; cursor: pointer;
    border-left: 3px solid transparent;
  }
  .tag-row:hover { background: var(--panel); border-left-color: var(--tag); }
  .tag-row.on-paper { border-left-color: var(--tag); background: rgba(204, 121, 167, 0.10); }
  .tag-name { font-size: 12.5px; flex: 1; }
  .tag-count { font-family: var(--mono); font-size: 11px; color: var(--faint); min-width: 26px; text-align: right; }
  .tag-bar { height: 3px; background: var(--tag); border-radius: 2px; margin: 3px 16px 0; opacity: 0.7; }
  .tag-hint { padding: 14px 16px; color: var(--faint); font-size: 12px; font-style: italic; }

  /* ---------- Settings modal ---------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(10, 13, 17, 0.75); display: none;
    align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; z-index: 10;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    width: 100%; max-width: 560px; padding: 22px 24px;
  }
  .modal h2 { font-family: var(--mono); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
  .modal h3 { font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--faint); margin: 18px 0 8px; font-family: var(--mono); }
  .modal label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .modal input[type="date"], .modal input[type="text"], .modal select, .modal textarea {
    width: 100%; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 13px; padding: 7px 10px; margin-bottom: 10px;
  }
  .modal textarea { min-height: 90px; font-family: var(--mono); font-size: 12px; resize: vertical; }
  .modal input:focus, .modal select:focus, .modal textarea:focus { outline: none; border-color: var(--accent); }
  .cls-item {
    display: flex; align-items: center; gap: 10px; padding: 7px 10px;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px;
    font-family: var(--mono); font-size: 12px;
  }
  .cls-item .del { margin-left: auto; background: none; border: none; color: var(--faint); font-size: 14px; }
  .cls-item .del:hover { color: var(--danger); }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
  .btn-danger { color: var(--danger); }
  .btn-danger:hover { border-color: var(--danger); }

  /* ---------- Toast ---------- */
  #toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--panel-2); border: 1px solid var(--success); color: var(--success);
    font-family: var(--mono); font-size: 12px; padding: 9px 18px; border-radius: 7px;
    transition: transform 0.25s ease; z-index: 20; pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ---------- View toggle (dashboard vs workspace) ---------- */
  #dashboardView { display: none; }
  body.view-dashboard #dashboardView { display: block; }
  body.view-dashboard #workspaceView { display: none; }
  body.view-dashboard .hdr-stats,
  body.view-dashboard .progress-wrap { display: none; }
  body.view-workspace #dashboardView { display: none; }

  /* ---------- Dashboard ---------- */
  #dashboardView { max-width: 1080px; margin: 0 auto; width: 100%; padding: 24px 28px 44px; min-height: calc(100vh - 92px); }
  .dash-empty { padding: 60px 20px; text-align: center; color: var(--faint); font-size: 14px; line-height: 1.7; }
  .dash-empty .btn { margin-top: 16px; }
  .dash-section {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 22px; margin-bottom: 18px;
  }
  .dash-h {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--faint); margin-bottom: 12px;
  }
  .dash-hero-top { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  .dash-bignum { font-family: var(--mono); font-size: 44px; font-weight: 600; color: var(--accent); line-height: 1; }
  .dash-bigsub { font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .progress-track.lg { height: 12px; border-radius: 6px; }

  .dash-tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(118px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .tile { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 13px 15px; }
  .tile-label { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--faint); }
  .tile-value { font-family: var(--mono); font-size: 26px; font-weight: 600; margin-top: 4px; color: var(--text); }
  .tile.good .tile-value { color: var(--success); }
  .tile.warn .tile-value { color: var(--danger); }

  .linklike { background: none; border: none; color: var(--info); font: inherit; padding: 0; text-decoration: underline; }

  .class-card { background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 13px 15px; margin-bottom: 10px; }
  .class-card:last-child { margin-bottom: 0; }
  .class-card-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .class-card-name { font-size: 14px; font-weight: 600; }
  .job-class { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--muted); margin-left: 8px; }
  .job-due { font-family: var(--mono); font-size: 11px; color: var(--faint); margin-top: 4px; }
  .class-card-frac { font-family: var(--mono); font-size: 12px; color: var(--muted); white-space: nowrap; }
  .class-card .progress-track { margin: 10px 0 9px; }
  .class-card-foot { display: flex; align-items: center; gap: 12px; }
  .cc-chip { font-family: var(--mono); font-size: 11px; color: var(--faint); }
  .cc-chip.miss { color: var(--danger); }
  .cc-chip.cc-done { color: var(--success); }
  .cc-chip.up { color: var(--info); }
  .btn-resume {
    margin-left: auto; background: var(--panel); border: 1px solid var(--accent-dim); color: var(--accent);
    border-radius: 6px; padding: 5px 12px; font-family: var(--mono); font-size: 12px; font-weight: 600;
  }
  .btn-resume:hover { border-color: var(--accent); background: rgba(230, 159, 0, 0.10); }

  .dash-jobs-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; }
  .btn-newjob {
    background: var(--panel-2); border: 1px solid var(--accent-dim); color: var(--accent);
    border-radius: 6px; padding: 5px 12px; font-family: var(--mono); font-size: 12px; font-weight: 600;
  }
  .btn-newjob:hover { border-color: var(--accent); background: rgba(230, 159, 0, 0.10); }
  .class-card-right { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
  .job-icon { background: none; border: none; color: var(--faint); font-size: 14px; line-height: 1; padding: 2px 4px; }
  .job-icon:hover { color: var(--accent); }
  .job-icon.job-del:hover { color: var(--danger); }
  .paper-sat { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .paper-sat input[type="date"] {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 12px; padding: 5px 8px;
  }
  .paper-sat input[type="date"]:focus { outline: none; border-color: var(--info); }
  .paper-sat-hint { color: var(--accent); font-size: 11px; }

  /* ---------- Responsive ---------- */
  @media (max-width: 980px) {
    #workspaceView { grid-template-columns: 1fr; }
    .col { border-right: none; border-bottom: 1px solid var(--border); }
    #roster, #tagList { max-height: 300px; }
  }
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <button id="homeBtn" title="Back to dashboard">‹ Dashboard</button>
    <span class="hdr-title" id="hdrTitle">Marking Console</span>
    <div class="hdr-stats">
      <span>days left <b id="statDays">–</b></span>
      <span>today's target <b id="statTarget">–</b></span>
      <span class="today-hit">marked today <b id="statToday">0</b></span>
      <span>missing <b id="statMissing">0</b></span>
    </div>
    <button id="themeBtn" title="Toggle light/dark">☀ Light</button>
    <button id="settingsBtn">Set up</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 / 0 marked</div>
  </div>
</header>

<main id="dashboardView"></main>

<main id="workspaceView">
  <!-- Roster -->
  <section class="col">
    <div class="col-head"><span>Papers</span><span id="classProgress"></span></div>
    <div class="class-chips" id="classChips"></div>
    <div id="roster"></div>
  </section>

  <!-- Current paper -->
  <section class="col paper-col">
    <div class="col-head"><span>Current paper</span></div>
    <div id="calibHolder"></div>
    <div id="paperPanel"></div>
    <div class="class-summary-row">
      <button class="btn btn-copy" id="classSummaryBtn" style="font-size:12px; padding:7px 12px;">Copy tag summary</button>
      <button class="btn btn-copy" id="assessDataBtn" style="font-size:12px; padding:7px 12px;">Copy assessment data</button>
    </div>
  </section>

  <!-- Tags -->
  <section class="col tag-col">
    <div class="col-head"><span>Trip hazards</span><span id="tagTotal"></span></div>
    <div id="tagAdd">
      <input id="tagInput" placeholder="New tag, e.g. sig figs dropped" maxlength="80">
      <button id="tagAddBtn" title="Add tag">+</button>
    </div>
    <div id="tagList"></div>
  </section>
</main>

<!-- Settings modal -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <h2>Set up</h2>

    <h3>Classes</h3>
    <div id="classList"></div>
    <label for="newClassName">Class name</label>
    <input type="text" id="newClassName" placeholder="e.g. 11PSC Physical Sciences">
    <label for="newRoster">Roster, one student per line, first name then last name (order preserved)</label>
    <textarea id="newRoster" placeholder="Sophia King&#10;Liam Patel&#10;Aroha Ngata"></textarea>
    <button class="btn" id="addClassBtn">Add class</button>

    <h3>Calibration check</h3>
    <label for="calibSelect">Remind me to re-read my first marked paper every…</label>
    <select id="calibSelect">
      <option value="0">Off</option>
      <option value="5">5 papers</option>
      <option value="8">8 papers</option>
      <option value="10">10 papers</option>
    </select>

    <h3>Data</h3>
    <div class="modal-actions" style="margin-top:6px;">
      <button class="btn" id="exportBtn">Export backup (JSON)</button>
      <button class="btn" id="importBtn">Import backup</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
      <button class="btn btn-danger" id="resetBtn">Reset everything</button>
    </div>

    <div class="modal-actions">
      <button class="btn btn-done" id="closeSettingsBtn">Done</button>
    </div>
  </div>
</div>

<!-- New / edit marking job modal -->
<div class="overlay" id="jobOverlay">
  <div class="modal">
    <h2 id="jobModalTitle">New marking job</h2>
    <label for="jobClass">Class</label>
    <select id="jobClass"></select>
    <label for="jobName">Assessment name</label>
    <input type="text" id="jobName" placeholder="e.g. Term 2 Test, Practical Report">
    <label for="jobSat">Date sat (optional)</label>
    <input type="date" id="jobSat">
    <label for="jobDue">Date marking is due (optional; drives the daily target)</label>
    <input type="date" id="jobDue">
    <div class="modal-actions">
      <button class="btn btn-done" id="jobSaveBtn">Add job</button>
      <button class="btn" id="jobCancelBtn">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ---------------- State ----------------
// v2 model: classes are persistent rosters; assessments are the markable jobs
// attached to a class, each holding its own per-student marks.
const KEY = 'markingConsole.v2';
const OLD_KEY = 'markingConsole.v1';

const DEFAULT_MARK = () => ({ status: 'unmarked', tags: [], note: '', markedAt: null, satOn: '' });

const blank = () => ({
  classes: [],          // {id, name, students:[{id, first, last, label}]}
  assessments: [],      // {id, classId, name, dueDate, createdAt, marks:{studentId:{status,tags,note,markedAt}}}
  tags: [],             // {id, name}
  ui: { currentClass: null, currentAssessment: null, currentStudent: null, view: 'dashboard', theme: 'dark' },
  settings: { calibrateEvery: 0 }
});

let S = load();

function load() {
  try {
    const v2 = localStorage.getItem(KEY);
    if (v2) return normalize(JSON.parse(v2));
    const v1 = localStorage.getItem(OLD_KEY);
    if (v1) return migrateV1(JSON.parse(v1));
  } catch (e) { console.warn('Load failed', e); }
  return blank();
}

// Fill in any missing keys so older or partial saved states never crash a render.
function normalize(d) {
  const b = blank();
  d = d || {};
  d.classes = Array.isArray(d.classes) ? d.classes : [];
  d.assessments = Array.isArray(d.assessments) ? d.assessments : [];
  d.tags = Array.isArray(d.tags) ? d.tags : [];
  d.assessments.forEach(a => { if (!a.marks || typeof a.marks !== 'object') a.marks = {}; });
  d.ui = Object.assign({}, b.ui, d.ui || {});
  d.settings = Object.assign({}, b.settings, d.settings || {});
  return d;
}

// One-time conversion from the old shape where each class carried its marks
// directly. Each old class becomes a roster plus one assessment holding those
// marks, seeded with the old global deadline. The v1 record is left in place
// as a fallback and is not deleted.
function migrateV1(d) {
  const out = blank();
  out.tags = Array.isArray(d.tags) ? d.tags : [];
  out.settings.calibrateEvery = (d.settings && d.settings.calibrateEvery) || 0;
  out.ui.theme = (d.ui && d.ui.theme) || 'dark';
  const due = (d.settings && d.settings.endDate) || '';
  (d.classes || []).forEach(oldC => {
    const students = (oldC.students || []).map(s => ({ id: s.id, first: s.first, last: s.last, label: s.label }));
    out.classes.push({ id: oldC.id, name: oldC.name, students });
    const marks = {};
    (oldC.students || []).forEach(s => {
      marks[s.id] = { status: s.status || 'unmarked', tags: (s.tags || []).slice(), note: s.note || '', markedAt: s.markedAt || null };
    });
    out.assessments.push({ id: uid(), classId: oldC.id, name: 'Assessment 1', dueDate: due, createdAt: new Date().toISOString(), marks });
  });
  return out;
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(S)); }
  catch (e) { toast('Warning: could not save'); }
}
// Function declaration (hoisted) so load()/migrateV1() can call it before this
// point in source order.
function uid() { return Math.random().toString(36).slice(2, 9); }

// ---------------- Derived helpers ----------------
const curAssessment = () => S.assessments.find(a => a.id === S.ui.currentAssessment) || null;
const classOf = a => (a ? S.classes.find(c => c.id === a.classId) || null : null);
const curClass = () => classOf(curAssessment()) || S.classes.find(c => c.id === S.ui.currentClass) || null;
const curStudent = () => {
  const c = curClass();
  return c ? c.students.find(s => s.id === S.ui.currentStudent) || null : null;
};

// Read a student's mark for an assessment; returns a fresh default (not
// persisted) when none exists yet, so reads are always safe.
function markOf(a, sid) { return (a && a.marks[sid]) || DEFAULT_MARK(); }
// Get the mark for writing, creating it on first touch.
function ensureMark(a, sid) { if (!a.marks[sid]) a.marks[sid] = DEFAULT_MARK(); return a.marks[sid]; }

const tagName = tagId => (S.tags.find(t => t.id === tagId) || {}).name || '?';

function todayStr() { return new Date().toISOString().slice(0, 10); }
function dueDaysLeft(a) {
  if (!a || !a.dueDate) return null;
  const end = new Date(a.dueDate + 'T23:59:59');
  return Math.max(0, Math.ceil((end - new Date()) / 86400000));
}
function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-NZ', { weekday: 'short', day: 'numeric', month: 'short' });
}

// Per-assessment figures: the single source of truth for one job's numbers,
// used by the header, dashboard and settings alike.
function assessmentStats(a) {
  const cls = classOf(a);
  const students = cls ? cls.students : [];
  const total = students.length;
  let marked = 0, missing = 0, markedToday = 0;
  students.forEach(s => {
    const m = markOf(a, s.id);
    if (m.status === 'marked') { marked++; if (m.markedAt && m.markedAt.slice(0, 10) === todayStr()) markedToday++; }
    else if (m.status === 'missing') missing++;
  });
  const denom = total - missing;
  const remaining = denom - marked;
  const pct = denom ? Math.round(100 * marked / denom) : 0;
  const dl = dueDaysLeft(a);
  // Daily target: today's marked papers count toward today, so the number stays
  // stable through the day instead of shrinking as you work.
  const dailyTarget = (dl && dl > 0) ? Math.ceil((remaining + markedToday) / dl) : null;
  const complete = total > 0 && remaining === 0;
  // A job whose sit date is still in the future has nothing to mark yet.
  const upcoming = !!a.dateSat && a.dateSat > todayStr() && !complete;
  return { a, cls, total, marked, missing, markedToday, denom, remaining, pct, dl, dailyTarget, complete, upcoming };
}

// Count how many papers in one assessment carry a given tag.
function tagCountInAssessment(a, tagId) {
  const cls = classOf(a);
  if (!cls) return 0;
  return cls.students.reduce((n, s) => n + (markOf(a, s.id).tags.includes(tagId) ? 1 : 0), 0);
}

// ---------------- Label generation ----------------
// Entry order is preserved; labels are "First X", extending the surname prefix
// until unique within the class. No sorting, so the roster keeps the order you
// typed or pasted.
function buildLabels(students) {
  students.forEach(s => { s._len = 1; });
  let changed = true;
  while (changed) {
    changed = false;
    const seen = {};
    students.forEach(s => {
      const lab = s.first + ' ' + s.last.slice(0, s._len);
      (seen[lab] = seen[lab] || []).push(s);
    });
    Object.values(seen).forEach(group => {
      if (group.length > 1) {
        group.forEach(s => { if (s._len < s.last.length) { s._len++; changed = true; } });
      }
    });
  }
  const finalSeen = {};
  students.forEach(s => {
    let lab = s.first + ' ' + s.last.slice(0, s._len);
    if (finalSeen[lab]) { lab += ' ' + (++finalSeen[lab]); } else { finalSeen[lab] = 1; }
    s.label = lab;
    delete s._len;
  });
}

// ---------------- Rendering ----------------
function render() {
  const view = (S.ui.view === 'workspace') ? 'workspace' : 'dashboard';
  document.body.classList.toggle('view-dashboard', view === 'dashboard');
  document.body.classList.toggle('view-workspace', view === 'workspace');
  const light = S.ui.theme === 'light';
  document.body.classList.toggle('theme-light', light);
  document.getElementById('themeBtn').textContent = light ? '☾ Night' : '☀ Light';
  renderHeader(); renderDashboard(); renderChips(); renderRoster(); renderPaper(); renderTags();
}

function toggleTheme() {
  S.ui.theme = S.ui.theme === 'light' ? 'dark' : 'light';
  save(); render();
}

function renderHeader() {
  const a = curAssessment();
  const st = a ? assessmentStats(a) : null;
  document.getElementById('statDays').textContent = (st && st.dl !== null) ? st.dl : '–';
  document.getElementById('statTarget').textContent = (st && st.dailyTarget !== null) ? st.dailyTarget : '–';
  document.getElementById('statToday').textContent = st ? st.markedToday : 0;
  document.getElementById('statMissing').textContent = st ? st.missing : 0;
  document.getElementById('progressFill').style.width = (st ? st.pct : 0) + '%';
  document.getElementById('progressLabel').textContent = st ? `${st.marked} / ${st.denom} marked (${st.pct}%)` : '0 / 0 marked';
}

// ---------------- Dashboard (landing view) ----------------
function renderDashboard() {
  const el = document.getElementById('dashboardView');
  if (!S.classes.length) {
    el.innerHTML = `<div class="dash-empty">No classes yet. Start by adding your classes.<br>
      <button class="btn" onclick="openSettings()">Open Set up</button></div>`;
    return;
  }
  if (!S.assessments.length) {
    el.innerHTML = `<div class="dash-empty">${S.classes.length} class${S.classes.length === 1 ? '' : 'es'} ready.
      Add a marking job to start.<br>
      <button class="btn" onclick="openJobModal()">Add a marking job</button></div>`;
    return;
  }

  const list = S.assessments.map(assessmentStats);
  let marked = 0, denom = 0, remaining = 0, missing = 0, markedToday = 0, targetToday = 0;
  list.forEach(x => {
    marked += x.marked; denom += x.denom; remaining += x.remaining; missing += x.missing; markedToday += x.markedToday;
    if (x.dailyTarget) targetToday += x.dailyTarget;
  });
  const pct = denom ? Math.round(100 * marked / denom) : 0;
  const active = list.filter(x => !x.complete);
  const dued = active.map(x => x.a.dueDate).filter(Boolean).sort();
  const nextDue = dued.length ? dued[0] : '';
  const onTrack = targetToday > 0 && markedToday >= targetToday;

  // Jobs sorted into three groups: markable now, then upcoming (not yet sat),
  // then completed. Within the first and last, by due date (undated last);
  // upcoming sorts by its sit date.
  const rank = x => x.complete ? 2 : (x.upcoming ? 1 : 0);
  const order = list.slice().sort((x, y) => {
    const rr = rank(x) - rank(y);
    if (rr) return rr;
    if (rank(x) === 1) {
      return (x.a.dateSat || '9999-99-99').localeCompare(y.a.dateSat || '9999-99-99') || (x.a.createdAt || '').localeCompare(y.a.createdAt || '');
    }
    const dx = x.a.dueDate || '9999-99-99', dy = y.a.dueDate || '9999-99-99';
    return dx.localeCompare(dy) || (x.a.createdAt || '').localeCompare(y.a.createdAt || '');
  });

  el.innerHTML = `
    <section class="dash-section">
      <div class="dash-h">Overall progress</div>
      <div class="dash-hero-top">
        <span class="dash-bignum">${pct}%</span>
        <span class="dash-bigsub">${marked} of ${denom} papers marked${missing ? ` · ${missing} not submitted` : ''}${nextDue ? ` · next due ${esc(fmtDate(nextDue))}` : ''}</span>
      </div>
      <div class="progress-track lg" style="margin-top:14px;"><div class="progress-fill" style="width:${pct}%"></div></div>
    </section>

    <section class="dash-tiles">
      ${tile('Active jobs', active.length)}
      ${tile('Remaining', remaining, remaining === 0 ? 'good' : '')}
      ${tile('Marked today', markedToday, onTrack ? 'good' : '')}
      ${tile("Today's target", targetToday || '–')}
      ${tile('Missing', missing, missing ? 'warn' : '')}
    </section>

    <section class="dash-section">
      <div class="dash-jobs-head"><span class="dash-h" style="margin-bottom:0;">Marking jobs</span>
        <button class="btn-newjob" onclick="openJobModal()">+ New marking job</button></div>
      ${order.map(jobCard).join('')}
    </section>`;
}

function tile(label, value, cls) {
  return `<div class="tile ${cls || ''}"><div class="tile-label">${esc(label)}</div>
    <div class="tile-value">${esc(String(value))}</div></div>`;
}

function jobCard(x) {
  const a = x.a, cls = x.cls;
  const dateParts = [];
  if (a.dateSat) dateParts.push(`sat ${esc(fmtDate(a.dateSat))}`);
  dateParts.push(a.dueDate
    ? `due ${esc(fmtDate(a.dueDate))}${x.dl !== null ? ` · ${x.dl} day${x.dl === 1 ? '' : 's'} left` : ''}`
    : 'no due date');
  const datesTxt = dateParts.join(' · ');
  let pace;
  if (x.complete) pace = `<span class="cc-chip cc-done">Complete ✓</span>`;
  else if (x.upcoming) pace = `<span class="cc-chip up">upcoming</span>`;
  else if (x.dl === 0) pace = `<span class="cc-chip miss">due now · ${x.remaining} left</span>`;
  else if (x.dailyTarget) pace = `<span class="cc-chip">${x.dailyTarget}/day to finish on time</span>`;
  else pace = `<span class="cc-chip">${x.remaining} to mark</span>`;
  const missChip = x.missing ? `<span class="cc-chip miss">${x.missing} missing</span>` : '';
  const btn = `<button class="btn-resume" onclick="openAssessment('${a.id}')">${x.complete ? 'Review' : 'Resume ›'}</button>`;
  return `<div class="class-card">
    <div class="class-card-top">
      <span class="class-card-name">${esc(a.name)}<span class="job-class">${esc(cls ? cls.name : '')}</span></span>
      <span class="class-card-right">
        <span class="class-card-frac">${x.marked}/${x.denom}${x.denom ? ` · ${x.pct}%` : ''}</span>
        <button class="job-icon" title="Edit job" onclick="openJobModal('${a.id}')">✎</button>
        <button class="job-icon job-del" title="Delete job" onclick="deleteAssessment('${a.id}')">×</button>
      </span>
    </div>
    <div class="job-due">${datesTxt}</div>
    <div class="progress-track"><div class="progress-fill" style="width:${x.pct}%"></div></div>
    <div class="class-card-foot">${pace}${missChip}${btn}</div>
  </div>`;
}

function openAssessment(aid) {
  const a = S.assessments.find(x => x.id === aid);
  if (!a) return;
  S.ui.currentAssessment = aid;
  S.ui.currentClass = a.classId;
  const cls = classOf(a);
  const first = cls ? cls.students.find(s => markOf(a, s.id).status === 'unmarked') : null;
  S.ui.currentStudent = first ? first.id : (cls && cls.students[0] ? cls.students[0].id : null);
  S.ui.view = 'workspace';
  save(); render();
}

function goDashboard() {
  S.ui.view = 'dashboard';
  save(); render();
}

// Sibling assessments of the current class, so you can flip between, say, a
// test and a practical for the same class without going back to the dashboard.
function renderChips() {
  const holder = document.getElementById('classChips');
  holder.innerHTML = '';
  const c = curClass();
  if (!c) { holder.innerHTML = '<span style="color:var(--faint);font-size:12px;">No assessment selected.</span>'; return; }
  const sibs = S.assessments.filter(a => a.classId === c.id);
  if (!sibs.length) { holder.innerHTML = '<span style="color:var(--faint);font-size:12px;">No assessments for this class.</span>'; return; }
  sibs.forEach(a => {
    const st = assessmentStats(a);
    const b = document.createElement('button');
    b.className = 'class-chip' + (a.id === S.ui.currentAssessment ? ' active' : '');
    b.innerHTML = `${esc(a.name)}<span class="mini">${st.marked}/${st.denom}</span>`;
    b.onclick = () => openAssessment(a.id);
    holder.appendChild(b);
  });
}

function renderRoster() {
  const holder = document.getElementById('roster');
  const cp = document.getElementById('classProgress');
  holder.innerHTML = '';
  const a = curAssessment();
  const c = curClass();
  if (!a || !c) { cp.textContent = ''; return; }
  const st = assessmentStats(a);
  cp.textContent = `${st.marked}/${c.students.length}`;
  c.students.forEach(s => {
    const m = markOf(a, s.id);
    const row = document.createElement('div');
    row.className = 'stu-row ' + m.status + (s.id === S.ui.currentStudent ? ' current' : '');
    row.innerHTML = `
      <span class="stu-status"><svg viewBox="0 0 12 12"><path d="M2 6.5 L5 9.5 L10 3"/></svg></span>
      <span class="stu-label">${esc(s.label)}</span>
      <span class="stu-tagcount">${m.tags.length ? m.tags.length + ' tag' + (m.tags.length > 1 ? 's' : '') : ''}</span>`;
    row.onclick = () => { S.ui.currentStudent = s.id; save(); render(); };
    holder.appendChild(row);
  });
}

function renderPaper() {
  const holder = document.getElementById('paperPanel');
  const a = curAssessment();
  const c = curClass();
  const s = curStudent();
  if (!S.classes.length) {
    holder.innerHTML = `<div class="empty-state">No classes set up yet.<br>
      <button class="btn" onclick="openSettings()">Open Set up</button></div>`;
    return;
  }
  if (!a || !c) {
    holder.innerHTML = `<div class="empty-state">Pick a marking job from the dashboard to begin.<br>
      <button class="btn" onclick="goDashboard()">Go to dashboard</button></div>`;
    return;
  }
  if (!s) {
    holder.innerHTML = `<div class="empty-state">Select a paper from the roster,<br>or jump to the next unmarked one.<br>
      <button class="btn" onclick="gotoNextUnmarked()">Next unmarked paper</button></div>`;
    return;
  }
  const m = ensureMark(a, s.id);
  const idx = c.students.indexOf(s) + 1;
  const tagsHtml = m.tags.length
    ? m.tags.map(tid => `<span class="ptag">${esc(tagName(tid))}<button title="Remove" onclick="removeTagFromPaper('${tid}')">×</button></span>`).join('')
    : '<span class="paper-empty-tags">Click tags on the right as you spot mistakes.</span>';
  holder.innerHTML = `
    <div class="paper-pos">PAPER ${idx} OF ${c.students.length} · ${esc(a.name)}</div>
    <div class="paper-name">${esc(s.label)}<span class="cls">${esc(c.name)}</span></div>
    <div class="paper-tags">${tagsHtml}</div>
    <textarea id="noteInput" placeholder="Optional note for this paper (goes into the feedback prompt)">${esc(m.note || '')}</textarea>
    <div class="paper-sat">Sat on <input type="date" id="satInput" value="${esc(m.satOn || a.dateSat || '')}">
      <span class="paper-sat-hint">${(m.satOn && a.dateSat && m.satOn !== a.dateSat) ? 'later sitting' : ''}</span></div>
    <div class="paper-actions">
      <button class="btn btn-done" onclick="markDone()">✓ Mark done</button>
      <button class="btn btn-copy" onclick="copyPrompt()">Copy feedback prompt</button>
      <button class="btn btn-missing" onclick="toggleMissing()">${m.status === 'missing' ? 'Un-mark missing' : 'Not submitted'}</button>
    </div>
    <div class="nav-row">
      <button class="btn btn-nav" onclick="step(-1)">← Prev</button>
      <button class="btn btn-nav" onclick="step(1)">Next →</button>
      <button class="btn btn-nav" onclick="gotoNextUnmarked()">Next unmarked ⇥</button>
    </div>`;
  document.getElementById('noteInput').addEventListener('change', e => {
    ensureMark(a, s.id).note = e.target.value; save(); renderRoster();
  });
  document.getElementById('satInput').addEventListener('change', e => {
    ensureMark(a, s.id).satOn = e.target.value; save(); renderPaper();
  });
}

function renderTags() {
  const list = document.getElementById('tagList');
  list.innerHTML = '';
  const a = curAssessment();
  const s = curStudent();
  const m = (a && s) ? markOf(a, s.id) : null;
  if (!S.tags.length) {
    list.innerHTML = '<div class="tag-hint">Add trip hazards as you meet them. Click one to log it against the current paper; the list sorts by frequency within this assessment so common mistakes rise to the top.</div>';
    document.getElementById('tagTotal').textContent = '';
    return;
  }
  const counts = S.tags.map(t => ({ t, n: a ? tagCountInAssessment(a, t.id) : 0 }));
  counts.sort((x, y) => y.n - x.n || x.t.name.localeCompare(y.t.name));
  const max = Math.max(1, ...counts.map(x => x.n));
  counts.forEach(({ t, n }) => {
    const row = document.createElement('div');
    row.className = 'tag-row' + (m && m.tags.includes(t.id) ? ' on-paper' : '');
    row.innerHTML = `<span class="tag-name">${esc(t.name)}</span><span class="tag-count">×${n}</span>`;
    row.onclick = () => toggleTagOnPaper(t.id);
    list.appendChild(row);
    if (n > 0) {
      const bar = document.createElement('div');
      bar.className = 'tag-bar';
      bar.style.width = `calc(${Math.round(100 * n / max)}% - 32px)`;
      list.appendChild(bar);
    }
  });
  const total = counts.reduce((acc, x) => acc + x.n, 0);
  document.getElementById('tagTotal').textContent = total ? `${total} logged` : '';
}

// ---------------- Actions ----------------
function toggleTagOnPaper(tagId) {
  const a = curAssessment(); const s = curStudent();
  if (!a || !s) { toast('Select a paper first'); return; }
  const m = ensureMark(a, s.id);
  const i = m.tags.indexOf(tagId);
  if (i >= 0) m.tags.splice(i, 1); else m.tags.push(tagId);
  save(); renderRoster(); renderPaper(); renderTags();
}
function removeTagFromPaper(tagId) {
  const a = curAssessment(); const s = curStudent();
  if (!a || !s) return;
  const m = ensureMark(a, s.id);
  const i = m.tags.indexOf(tagId);
  if (i >= 0) m.tags.splice(i, 1);
  save(); renderRoster(); renderPaper(); renderTags();
}
function addTag() {
  const input = document.getElementById('tagInput');
  const name = input.value.trim();
  if (!name) return;
  if (S.tags.some(t => t.name.toLowerCase() === name.toLowerCase())) { toast('Tag already exists'); return; }
  const t = { id: uid(), name };
  S.tags.push(t);
  const a = curAssessment(); const s = curStudent();
  if (a && s) ensureMark(a, s.id).tags.push(t.id);   // adding a tag mid-paper almost always means you just saw it
  input.value = '';
  save(); render();
}

function markDone() {
  const a = curAssessment(); const c = curClass(); const s = curStudent();
  if (!a || !c || !s) return;
  const m = ensureMark(a, s.id);
  m.status = 'marked';
  m.markedAt = new Date().toISOString();
  save();
  render();
  // tick animation on the row
  const rows = document.querySelectorAll('.stu-row');
  const idx = c.students.indexOf(s);
  if (rows[idx]) {
    rows[idx].classList.add('just-marked');
    setTimeout(() => rows[idx] && rows[idx].classList.remove('just-marked'), 950);
  }
  maybeCalibrate(a);
  setTimeout(gotoNextUnmarked, 350);
}

function toggleMissing() {
  const a = curAssessment(); const s = curStudent();
  if (!a || !s) return;
  const m = ensureMark(a, s.id);
  m.status = m.status === 'missing' ? 'unmarked' : 'missing';
  if (m.status === 'missing') m.markedAt = null;
  save(); render();
}

function step(dir) {
  const c = curClass();
  if (!c || !c.students.length) return;
  let i = c.students.findIndex(s => s.id === S.ui.currentStudent);
  i = (i + dir + c.students.length) % c.students.length;
  S.ui.currentStudent = c.students[i].id;
  save(); render();
}
function gotoNextUnmarked() {
  const a = curAssessment(); const c = curClass();
  if (!a || !c) return;
  const start = Math.max(0, c.students.findIndex(s => s.id === S.ui.currentStudent));
  const n = c.students.length;
  for (let k = 1; k <= n; k++) {
    const s = c.students[(start + k) % n];
    if (markOf(a, s.id).status === 'unmarked') { S.ui.currentStudent = s.id; save(); render(); return; }
  }
  // none left unmarked
  S.ui.currentStudent = null; save(); render();
  toast('All papers in this assessment are done 🎉');
}

// ---------------- Calibration ----------------
function maybeCalibrate(a) {
  const every = S.settings.calibrateEvery;
  if (!every) return;
  const c = classOf(a);
  if (!c) return;
  const marked = c.students.map(s => ({ s, m: markOf(a, s.id) })).filter(x => x.m.status === 'marked');
  if (marked.length && marked.length % every === 0) {
    const first = marked.slice().sort((x, y) => (x.m.markedAt || '').localeCompare(y.m.markedAt || ''))[0];
    const holder = document.getElementById('calibHolder');
    holder.innerHTML = `<div class="calib-banner">
      <span>Calibration check: re-read your first marked paper (${esc(first.s.label)}) and confirm you'd give it the same mark.</span>
      <button onclick="this.parentElement.remove()">×</button></div>`;
  }
}

// ---------------- Exports ----------------
function copyPrompt() {
  const a = curAssessment(); const c = curClass(); const s = curStudent();
  if (!a || !c || !s) return;
  const m = markOf(a, s.id);
  const lines = m.tags.map(tid => '- ' + tagName(tid));
  let txt = `Write a feedback comment for ${s.first}, a student in my ${c.name} class, on ${a.name}.\n\n`;
  txt += lines.length
    ? `Observed issues from my marking:\n${lines.join('\n')}\n`
    : `No specific recurring issues were tagged; the work was broadly sound.\n`;
  if (m.note && m.note.trim()) txt += `\nMarker's note: ${m.note.trim()}\n`;
  txt += `\nRequirements: address the student directly by first name; encouraging but honest; specific and actionable; around 80 words; plain readable prose; do not invent issues beyond those listed.`;
  clip(txt, 'Feedback prompt copied');
}

function copyAssessmentSummary() {
  const a = curAssessment(); const c = curClass();
  if (!a || !c) { toast('Open a marking job first'); return; }
  const st = assessmentStats(a);
  const freq = {};
  c.students.forEach(s => markOf(a, s.id).tags.forEach(tid => { freq[tid] = (freq[tid] || 0) + 1; }));
  const rows = Object.entries(freq)
    .sort((x, y) => y[1] - x[1])
    .map(([tid, n]) => `${String(n).padStart(3)} × ${tagName(tid)}`);
  let txt = `${c.name} — ${a.name} — tag summary (${st.marked}/${c.students.length} marked, ${st.missing} missing)\n`;
  txt += rows.length ? rows.join('\n') : '(no tags logged)';
  clip(txt, 'Assessment summary copied');
}

// Full anonymous dump of one assessment: every paper's status, tags and note,
// then the tag totals. Papers are numbered rather than named, so the text
// carries no student identities and is safe to share or feed to an AI for
// "how did this assessment go" style analysis.
function copyAssessmentData() {
  const a = curAssessment(); const c = curClass();
  if (!a || !c) { toast('Open a marking job first'); return; }
  const st = assessmentStats(a);
  const L = [];
  L.push(`${c.name} — ${a.name}`);
  const dates = [];
  if (a.dateSat) dates.push(`sat ${a.dateSat}`);
  if (a.dueDate) dates.push(`due ${a.dueDate}`);
  L.push(`${dates.length ? dates.join(', ') + '. ' : ''}${st.marked}/${c.students.length} marked, ${st.missing} missing.`);
  L.push('');
  L.push('Papers:');
  c.students.forEach((s, i) => {
    const m = markOf(a, s.id);
    let line = `- Paper ${i + 1} [${m.status}]`;
    if (m.satOn && a.dateSat && m.satOn !== a.dateSat) line += ` (sat ${m.satOn})`;
    const tags = m.tags.map(tid => tagName(tid));
    line += tags.length ? `: ${tags.join('; ')}` : ': (no tags)';
    if (m.note && m.note.trim()) line += ` — note: ${m.note.trim()}`;
    L.push(line);
  });
  const freq = {};
  c.students.forEach(s => markOf(a, s.id).tags.forEach(tid => { freq[tid] = (freq[tid] || 0) + 1; }));
  const rows = Object.entries(freq).sort((p, q) => q[1] - p[1]).map(([tid, n]) => `  ${n} × ${tagName(tid)}`);
  if (rows.length) { L.push(''); L.push('Tag totals:'); rows.forEach(r => L.push(r)); }
  clip(L.join('\n'), 'Assessment data copied');
}

function clip(text, msg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => toast(msg), () => fallbackClip(text, msg));
  } else fallbackClip(text, msg);
}
function fallbackClip(text, msg) {
  const ta = document.createElement('textarea');
  ta.value = text; document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); toast(msg); } catch (e) { toast('Copy failed'); }
  document.body.removeChild(ta);
}

// ---------------- Settings ----------------
function openSettings() {
  document.getElementById('calibSelect').value = String(S.settings.calibrateEvery || 0);
  renderClassList();
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
  render();
}
function renderClassList() {
  const holder = document.getElementById('classList');
  holder.innerHTML = S.classes.length ? '' : '<div style="color:var(--faint);font-size:12px;margin-bottom:8px;">No classes yet.</div>';
  S.classes.forEach(c => {
    const d = document.createElement('div');
    d.className = 'cls-item';
    d.innerHTML = `<span>${esc(c.name)}</span><span style="color:var(--faint)">${c.students.length} students</span>
      <button class="del" title="Delete class">×</button>`;
    d.querySelector('.del').onclick = () => {
      const n = S.assessments.filter(a => a.classId === c.id).length;
      if (confirm(`Delete ${c.name}${n ? ` and its ${n} assessment${n === 1 ? '' : 's'}` : ''}? This cannot be undone.`)) {
        S.classes = S.classes.filter(x => x.id !== c.id);
        S.assessments = S.assessments.filter(a => a.classId !== c.id);
        if (S.ui.currentClass === c.id) { S.ui.currentClass = null; S.ui.currentAssessment = null; S.ui.currentStudent = null; }
        save(); renderClassList(); populateJobClassSelect(); render();
      }
    };
    holder.appendChild(d);
  });
}
function populateJobClassSelect() {
  const sel = document.getElementById('jobClass');
  if (!sel) return;
  sel.innerHTML = S.classes.length
    ? S.classes.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('')
    : '<option value="">(add a class first)</option>';
}
function addClass() {
  const name = document.getElementById('newClassName').value.trim();
  const rosterRaw = document.getElementById('newRoster').value.trim();
  if (!name || !rosterRaw) { toast('Class name and roster both needed'); return; }
  const students = rosterRaw.split('\n').map(line => line.trim()).filter(Boolean).map(line => {
    const parts = line.split(/\s+/);
    const first = parts[0];
    const last = parts.length > 1 ? parts[parts.length - 1] : '';
    return { id: uid(), first, last, label: '' };
  });
  buildLabels(students);
  S.classes.push({ id: uid(), name, students });
  document.getElementById('newClassName').value = '';
  document.getElementById('newRoster').value = '';
  save(); renderClassList(); populateJobClassSelect(); render();
  toast(`${name} added, ${students.length} students`);
}

// ---------------- Marking jobs (assessments) ----------------
let editingJobId = null;
function openJobModal(editId) {
  editingJobId = editId || null;
  populateJobClassSelect();
  const sel = document.getElementById('jobClass');
  const nameEl = document.getElementById('jobName');
  const satEl = document.getElementById('jobSat');
  const dueEl = document.getElementById('jobDue');
  if (editingJobId) {
    const a = S.assessments.find(x => x.id === editingJobId);
    if (!a) { editingJobId = null; return; }
    sel.value = a.classId; sel.disabled = true;           // class is fixed once a job exists
    nameEl.value = a.name; satEl.value = a.dateSat || ''; dueEl.value = a.dueDate || '';
    document.getElementById('jobModalTitle').textContent = 'Edit marking job';
    document.getElementById('jobSaveBtn').textContent = 'Save changes';
  } else {
    if (!S.classes.length) { toast('Add a class in Set up first'); return; }
    sel.disabled = false;
    if (S.classes[0]) sel.value = S.classes[0].id;
    nameEl.value = ''; satEl.value = ''; dueEl.value = '';
    document.getElementById('jobModalTitle').textContent = 'New marking job';
    document.getElementById('jobSaveBtn').textContent = 'Add job';
  }
  document.getElementById('jobOverlay').classList.add('open');
  nameEl.focus();
}
function closeJobModal() {
  document.getElementById('jobOverlay').classList.remove('open');
  editingJobId = null;
}
function saveJob() {
  const name = document.getElementById('jobName').value.trim();
  const sat = document.getElementById('jobSat').value;
  const due = document.getElementById('jobDue').value;
  if (!name) { toast('Assessment needs a name'); return; }
  if (editingJobId) {
    const a = S.assessments.find(x => x.id === editingJobId);
    if (!a) { closeJobModal(); return; }
    a.name = name; a.dateSat = sat || ''; a.dueDate = due || '';
    save(); closeJobModal(); render();
    toast('Job updated');
  } else {
    const classId = document.getElementById('jobClass').value;
    const cls = S.classes.find(c => c.id === classId);
    if (!cls) { toast('Pick a class'); return; }
    const marks = {};
    cls.students.forEach(s => { marks[s.id] = DEFAULT_MARK(); });
    const a = { id: uid(), classId, name, dateSat: sat || '', dueDate: due || '', createdAt: new Date().toISOString(), marks };
    S.assessments.push(a);
    save(); closeJobModal(); render();
    toast(`${name} added to ${cls.name}`);
  }
}
function deleteAssessment(aid) {
  const a = S.assessments.find(x => x.id === aid);
  if (!a) return;
  if (!confirm(`Delete "${a.name}" and its marking? This cannot be undone.`)) return;
  S.assessments = S.assessments.filter(x => x.id !== aid);
  if (S.ui.currentAssessment === aid) { S.ui.currentAssessment = null; S.ui.currentStudent = null; }
  save(); render();
}

function exportBackup() {
  const blob = new Blob([JSON.stringify(S, null, 2)], { type: 'application/json' });
  const aEl = document.createElement('a');
  aEl.href = URL.createObjectURL(blob);
  aEl.download = `marking-console-backup-${todayStr()}.json`;
  aEl.click();
  URL.revokeObjectURL(aEl.href);
}
function importBackup(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (data.assessments) { S = normalize(data); }        // v2 backup
      else if (data.classes) { S = migrateV1(data); }        // old v1 backup
      else throw new Error('bad shape');
      S.ui.view = 'dashboard';
      save(); render(); renderClassList(); populateJobClassSelect();
      toast('Backup imported');
    } catch (e) { toast('Import failed: not a valid backup'); }
  };
  reader.readAsText(file);
}

// ---------------- Utilities ----------------
function esc(str) {
  return String(str).replace(/[&<>"']/g, ch =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}
let toastTimer = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ---------------- Wiring ----------------
document.getElementById('settingsBtn').onclick = openSettings;
document.getElementById('homeBtn').onclick = goDashboard;
document.getElementById('themeBtn').onclick = toggleTheme;
document.getElementById('hdrTitle').onclick = () => { if (S.ui.view === 'workspace') goDashboard(); };
document.getElementById('closeSettingsBtn').onclick = () => {
  S.settings.calibrateEvery = parseInt(document.getElementById('calibSelect').value, 10) || 0;
  save(); closeSettings();
};
document.getElementById('addClassBtn').onclick = addClass;
document.getElementById('jobSaveBtn').onclick = saveJob;
document.getElementById('jobCancelBtn').onclick = closeJobModal;
document.getElementById('jobOverlay').addEventListener('click', e => { if (e.target.id === 'jobOverlay') closeJobModal(); });
document.getElementById('tagAddBtn').onclick = addTag;
document.getElementById('tagInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTag(); });
document.getElementById('classSummaryBtn').onclick = copyAssessmentSummary;
document.getElementById('assessDataBtn').onclick = copyAssessmentData;
document.getElementById('exportBtn').onclick = exportBackup;
document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').addEventListener('change', e => {
  if (e.target.files[0]) importBackup(e.target.files[0]);
  e.target.value = '';
});
document.getElementById('resetBtn').onclick = () => {
  if (confirm('Delete ALL classes, assessments, tags, and progress? This cannot be undone.')) {
    S = blank(); save(); renderClassList(); populateJobClassSelect(); render();
  }
};
document.getElementById('settingsOverlay').addEventListener('click', e => {
  if (e.target.id === 'settingsOverlay') closeSettings();
});

// Dashboard is the landing view on every launch, even after pausing a session
// and returning; you always come back to the overview first.
S.ui.view = 'dashboard';
if (!S.ui.theme) S.ui.theme = 'dark';

// First run: open settings automatically so classes can be added.
if (!S.classes.length) openSettings();
render();
</script>
